<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HackAcademy — Etičko Hakovanje na Srpskom</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0b0f;--bg2:#111318;--bg3:#181a22;--bg4:#1e2028;
  --border:#2a2d3a;--border2:#383c4e;
  --text:#e8eaf2;--text2:#9ea3b8;--text3:#6b7190;
  --accent:#00d4aa;--accent2:#0099ff;--accent3:#ff6b6b;--accent4:#ffa726;
  --purple:#7c3aed;--green:#10b981;--red:#ef4444;--yellow:#f59e0b;
  --radius:10px;--radius-lg:16px;
}
[data-theme="light"]{
  --bg:#f0f2f8;--bg2:#ffffff;--bg3:#e8ecf4;--bg4:#dde2ef;
  --border:#c8cedf;--border2:#b0b8d0;
  --text:#1a1d2e;--text2:#4a5075;--text3:#7880a0;
}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;overflow-x:hidden}
.mono{font-family:'JetBrains Mono',monospace}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:260px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:width .3s;overflow:hidden}
.sidebar.collapsed{width:64px}
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.logo{padding:20px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);flex-shrink:0}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.logo-text{font-size:14px;font-weight:800;color:var(--accent);white-space:nowrap}
.logo-sub{font-size:10px;color:var(--text3)}
.nav{flex:1;padding:12px 8px;overflow-y:auto}
.nav-section{margin-bottom:20px}
.nav-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:1px;padding:0 8px 8px;white-space:nowrap;overflow:hidden}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius);cursor:pointer;transition:all .2s;margin-bottom:2px;user-select:none}
.nav-item:hover{background:var(--bg3)}
.nav-item.active{background:rgba(0,212,170,.12);border-left:3px solid var(--accent);color:var(--accent)}
.nav-icon{font-size:18px;flex-shrink:0;width:20px;text-align:center}
.nav-text{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden}
.nav-badge{margin-left:auto;background:var(--accent);color:#000;font-size:10px;font-weight:700;padding:2px 6px;border-radius:10px;flex-shrink:0}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10;flex-shrink:0}
.topbar-title{font-size:18px;font-weight:800;flex:1;white-space:nowrap}
.topbar-search{flex:1;max-width:280px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:8px 14px;color:var(--text);font-family:'Syne',sans-serif;font-size:13px;outline:none}
.topbar-search:focus{border-color:var(--accent)}
.topbar-btn{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:8px 12px;color:var(--text);cursor:pointer;font-size:13px;font-family:'Syne',sans-serif;transition:all .2s;white-space:nowrap}
.topbar-btn:hover{border-color:var(--accent);color:var(--accent)}
.user-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0}
.content{padding:24px;flex:1}
.welcome-banner{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:28px;margin-bottom:24px;position:relative;overflow:hidden}
.welcome-banner::after{content:'⚡';position:absolute;right:24px;top:50%;transform:translateY(-50%);font-size:80px;opacity:.06;pointer-events:none}
.welcome-name{font-size:24px;font-weight:800;margin-bottom:4px}
.welcome-name span{color:var(--accent)}
.welcome-sub{color:var(--text2);font-size:14px}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px}
.stat-label{font-size:12px;color:var(--text3);margin-bottom:8px}
.stat-value{font-size:26px;font-weight:800;font-family:'JetBrains Mono',monospace}
.stat-sub{font-size:11px;color:var(--text3);margin-top:4px}
.progress-bar{height:6px;background:var(--bg3);border-radius:3px;margin-top:8px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .5s}
.section-title{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}
.modules-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}
.module-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;cursor:pointer;transition:all .2s;position:relative}
.module-card:hover{border-color:var(--border2);transform:translateY(-2px)}
.module-card .card-icon{font-size:28px;margin-bottom:10px;display:block}
.module-card h3{font-size:14px;font-weight:700;margin-bottom:6px}
.module-card p{font-size:12px;color:var(--text2);line-height:1.5}
.module-card .card-progress{font-size:11px;color:var(--text3);margin-top:10px;display:flex;align-items:center;gap:8px}
.module-card .card-level{position:absolute;top:12px;right:12px;font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;background:var(--bg3);color:var(--text3)}
.cmd-block{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:16px;overflow:hidden}
.cmd-header{background:var(--bg3);padding:12px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.cmd-name{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;color:var(--accent)}
.cmd-category{font-size:11px;background:rgba(0,212,170,.1);color:var(--accent);padding:2px 8px;border-radius:20px}
.cmd-body{padding:20px}
.cmd-section{margin-bottom:16px}
.cmd-section:last-child{margin-bottom:0}
.cmd-section-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.cmd-section-title::before{content:'';width:3px;height:12px;background:var(--accent);border-radius:2px;display:inline-block}
.cmd-desc{font-size:14px;color:var(--text2);line-height:1.7}
.cmd-code{background:var(--bg);font-family:'JetBrains Mono',monospace;font-size:13px;padding:12px 16px;border-radius:var(--radius);border:1px solid var(--border);color:var(--accent);margin:4px 0;position:relative;word-break:break-all}
.cmd-output{background:#0d1117;font-family:'JetBrains Mono',monospace;font-size:12px;padding:12px 16px;border-radius:var(--radius);border:1px solid var(--border);color:#7fff7f;margin:4px 0;white-space:pre;overflow-x:auto;line-height:1.6}
.tip-box{background:rgba(0,153,255,.08);border:1px solid rgba(0,153,255,.25);border-radius:var(--radius);padding:12px 16px;font-size:13px;color:var(--text2);margin:8px 0;line-height:1.6}
.tip-box.warning{background:rgba(255,107,107,.08);border-color:rgba(255,107,107,.25)}
.tip-box.success{background:rgba(16,185,129,.08);border-color:rgba(16,185,129,.25)}
.terminal{background:#0d1117;border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:20px}
.terminal-header{background:var(--bg3);padding:10px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border)}
.terminal-dot{width:12px;height:12px;border-radius:50%}
.terminal-title{font-size:12px;color:var(--text3);margin-left:8px}
.terminal-body{padding:16px;min-height:200px;max-height:300px;overflow-y:auto}
.terminal-line{font-family:'JetBrains Mono',monospace;font-size:13px;margin-bottom:4px;line-height:1.5}
.terminal-line.prompt{color:#7fff7f}
.terminal-line.output{color:#c8d3f5}
.terminal-line.error{color:#ff6b6b}
.terminal-input-row{display:flex;align-items:center;gap:8px;padding:12px 16px;border-top:1px solid var(--border)}
.terminal-prompt-label{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--accent);white-space:nowrap}
.terminal-input{flex:1;background:transparent;border:none;color:#c8d3f5;font-family:'JetBrains Mono',monospace;font-size:13px;outline:none}
.quiz-container{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:28px;margin-bottom:20px}
.quiz-progress{display:flex;gap:6px;margin-bottom:24px}
.quiz-dot{height:4px;flex:1;border-radius:2px;background:var(--border)}
.quiz-dot.done{background:var(--accent)}
.quiz-dot.current{background:var(--accent2)}
.quiz-question{font-size:17px;font-weight:600;margin-bottom:20px;line-height:1.5}
.quiz-options{display:flex;flex-direction:column;gap:10px;margin-bottom:24px}
.quiz-option{background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--radius);padding:14px 18px;cursor:pointer;transition:all .2s;font-size:14px;text-align:left;font-family:'Syne',sans-serif;color:var(--text)}
.quiz-option:hover:not(:disabled){border-color:var(--accent2)}
.quiz-option.selected{border-color:var(--accent2);background:rgba(0,153,255,.1)}
.quiz-option.correct{border-color:var(--green);background:rgba(16,185,129,.1);color:var(--green)}
.quiz-option.wrong{border-color:var(--red);background:rgba(239,68,68,.1);color:var(--red)}
.quiz-btn{background:var(--accent);color:#000;border:none;border-radius:var(--radius);padding:12px 28px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s}
.quiz-btn:hover{opacity:.9}
.quiz-btn:disabled{opacity:.4;cursor:not-allowed}
.quiz-result{text-align:center;padding:20px 0}
.quiz-score{font-size:56px;font-weight:800;font-family:'JetBrains Mono',monospace;color:var(--accent);margin-bottom:8px}
.ai-container{display:flex;flex-direction:column;height:calc(100vh - 140px);background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.ai-messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
.ai-msg{display:flex;gap:12px;align-items:flex-start}
.ai-msg.user{flex-direction:row-reverse}
.ai-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.ai-avatar.bot{background:linear-gradient(135deg,var(--accent),var(--accent2))}
.ai-avatar.user{background:linear-gradient(135deg,var(--purple),var(--accent2))}
.ai-bubble{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 18px;max-width:75%;font-size:14px;line-height:1.7;color:var(--text);word-break:break-word}
.ai-msg.user .ai-bubble{background:rgba(0,212,170,.1);border-color:rgba(0,212,170,.3)}
.ai-typing{display:flex;gap:4px;align-items:center;padding:4px 0}
.ai-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:bounce .9s infinite}
.ai-dot:nth-child(2){animation-delay:.15s}
.ai-dot:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-8px)}}
.ai-input-row{padding:16px;border-top:1px solid var(--border);display:flex;gap:10px}
.ai-input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;outline:none;resize:none}
.ai-input:focus{border-color:var(--accent)}
.ai-send-btn{background:var(--accent);color:#000;border:none;border-radius:var(--radius);padding:12px 20px;cursor:pointer;font-size:18px;transition:all .2s;flex-shrink:0}
.ai-send-btn:hover{opacity:.85}
.ai-send-btn:disabled{opacity:.4;cursor:not-allowed}
.code-editor{background:#0d1117;border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:16px}
.editor-header{background:var(--bg3);padding:10px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.editor-lang{font-size:11px;color:var(--text3)}
.editor-actions{display:flex;gap:8px}
.editor-btn{background:var(--bg4);border:1px solid var(--border);border-radius:8px;padding:6px 14px;color:var(--text);font-size:12px;cursor:pointer;font-family:'Syne',sans-serif;transition:all .2s}
.editor-btn.run{background:rgba(16,185,129,.15);border-color:var(--green);color:var(--green)}
.editor-btn:hover{border-color:var(--accent)}
.code-textarea{width:100%;background:transparent;border:none;color:#c8d3f5;font-family:'JetBrains Mono',monospace;font-size:13px;padding:16px;outline:none;resize:vertical;min-height:200px;tab-size:4;line-height:1.6}
.code-output{background:#000;padding:16px;font-family:'JetBrains Mono',monospace;font-size:13px;color:#7fff7f;min-height:80px;border-top:1px solid var(--border);white-space:pre-wrap;line-height:1.6}
.tabs{display:flex;gap:4px;background:var(--bg3);border-radius:var(--radius);padding:4px;margin-bottom:20px}
.tab{flex:1;padding:8px 12px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;text-align:center;transition:all .2s;color:var(--text2);user-select:none}
.tab.active{background:var(--bg2);color:var(--text)}
.badges-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.badge-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;text-align:center;transition:all .2s}
.badge-card.unlocked{border-color:var(--accent);background:rgba(0,212,170,.05)}
.badge-card.locked{opacity:.4}
.badge-icon{font-size:32px;display:block;margin-bottom:10px}
.badge-name{font-size:13px;font-weight:700;margin-bottom:4px}
.badge-desc{font-size:11px;color:var(--text3)}
.notif{position:fixed;top:20px;right:20px;background:var(--bg2);border:1px solid var(--accent);border-radius:var(--radius);padding:14px 18px;font-size:13px;z-index:1000;animation:slideIn .3s ease}
@keyframes slideIn{from{opacity:0;transform:translateX(100%)}to{opacity:1;transform:translateX(0)}}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;display:flex;align-items:center;justify-content:center}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:28px;max-width:500px;width:90%;position:relative;max-height:85vh;overflow-y:auto}
.modal-close{position:absolute;right:16px;top:16px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--text2)}
.modal-title{font-size:20px;font-weight:800;margin-bottom:16px;padding-right:40px}
.path-item{display:flex;align-items:center;gap:16px;padding:14px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:all .2s}
.path-item:last-child{border-bottom:none}
.path-item:hover{padding-left:8px}
.path-num{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.path-num.done{background:var(--green);color:#fff}
.path-num.current{background:var(--accent2);color:#fff}
.path-num.locked{background:var(--bg3);color:var(--text3)}
.path-info h4{font-size:14px;font-weight:600;margin-bottom:2px}
.path-info p{font-size:12px;color:var(--text3)}
.path-badge{margin-left:auto;font-size:11px;padding:3px 8px;border-radius:20px;white-space:nowrap}
.path-badge.done{background:rgba(16,185,129,.15);color:var(--green)}
.path-badge.current{background:rgba(0,153,255,.15);color:var(--accent2)}
.path-badge.locked{background:var(--bg3);color:var(--text3)}
.fade-in{animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
@media(max-width:900px){.stats-grid{grid-template-columns:repeat(2,1fr)}.modules-grid{grid-template-columns:repeat(2,1fr)}.badges-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.sidebar{width:64px}.sidebar .logo-text,.sidebar .nav-text,.sidebar .nav-label,.sidebar .nav-badge,.sidebar .logo-sub{display:none}.stats-grid{grid-template-columns:1fr 1fr}.modules-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="sidebar" id="sidebar">
    <div class="logo">
      <div class="logo-icon">⚡</div>
      <div><div class="logo-text">HackAcademy</div><div class="logo-sub">Etičko Hakovanje</div></div>
    </div>
    <nav class="nav">
      <div class="nav-section">
        <div class="nav-label">Glavni Meni</div>
        <div class="nav-item active" onclick="navigate('dashboard')"><span class="nav-icon">🏠</span><span class="nav-text">Dashboard</span></div>
        <div class="nav-item" onclick="navigate('ai')"><span class="nav-icon">🤖</span><span class="nav-text">AI Mentor</span><span class="nav-badge">AI</span></div>
      </div>
      <div class="nav-section">
        <div class="nav-label">Moduli Učenja</div>
        <div class="nav-item" onclick="navigate('linux')"><span class="nav-icon">🐧</span><span class="nav-text">Linux</span></div>
        <div class="nav-item" onclick="navigate('cmd')"><span class="nav-icon">💻</span><span class="nav-text">CMD Windows</span></div>
        <div class="nav-item" onclick="navigate('powershell')"><span class="nav-icon">🔷</span><span class="nav-text">PowerShell</span></div>
        <div class="nav-item" onclick="navigate('networks')"><span class="nav-icon">🌐</span><span class="nav-text">Mreže</span></div>
        <div class="nav-item" onclick="navigate('python')"><span class="nav-icon">🐍</span><span class="nav-text">Python</span></div>
        <div class="nav-item" onclick="navigate('hacking')"><span class="nav-icon">🔒</span><span class="nav-text">Etičko Hakovanje</span></div>
      </div>
      <div class="nav-section">
        <div class="nav-label">Alati</div>
        <div class="nav-item" onclick="navigate('lab')"><span class="nav-icon">🧪</span><span class="nav-text">Laboratorija</span></div>
        <div class="nav-item" onclick="navigate('badges')"><span class="nav-icon">🏆</span><span class="nav-text">Bedževi</span></div>
      </div>
    </nav>
  </div>
  <div class="main">
    <div class="topbar">
      <button class="topbar-btn" onclick="toggleSidebar()" style="padding:8px 10px">☰</button>
      <div class="topbar-title" id="topbar-title">🏠 Dashboard</div>
      <input class="topbar-search" type="text" placeholder="🔍 Pretraži lekcije i komande...">
      <button class="topbar-btn" onclick="toggleTheme()">🌓 Tema</button>
      <button class="topbar-btn" onclick="navigate('lab')">🧪 Lab</button>
      <div class="user-avatar" onclick="showProfile()">AK</div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<div id="notif" class="notif" style="display:none"></div>
<div id="modal-overlay" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal">
    <div class="modal-close" onclick="closeModal()">✕</div>
    <div id="modal-content"></div>
  </div>
</div>

<script>
const ST={
  page:'dashboard',theme:'dark',xp:1240,level:3,
  progress:{linux:45,cmd:30,powershell:20,networks:60,python:35,hacking:15},
  completedLessons:12,totalLessons:48,
  badges:['beginner','linux_fan','network_hero'],
  aiMessages:[{role:'bot',text:'Zdravo! Ja sam tvoj AI Mentor za HackAcademy. 🤖\n\nMogu da ti pomognem sa:\n• Linux komandama i terminal-om\n• Windows CMD i PowerShell-om\n• Mrežnim protokolima (TCP/IP, DNS, HTTP)\n• Python programiranjem\n• Etičkim hakovanjem i sajber bezbednošću\n\nPitaj me bilo šta i odgovorim na srpskom jeziku! 💡'}],
  aiLoading:false,
  quizState:{q:0,score:0,answered:false,selected:null,done:false}
};

const DATA={
  linux:[
    {cmd:'ls',syntax:'ls [opcije] [putanja]',category:'Navigacija',
     desc:'Prikazuje sadržaj direktorijuma. Jedna od najkorišćenijih komandi u Linuxu. Pomaže da vidiš koje fajlove i foldere imaš.',

const pySimulator={
  run(code){
    const lines=[];
    const fakePrint=(...args)=>lines.push(args.map(a=>{
      if(Array.isArray(a))return`[${a.join(', ')}]`;
      if(typeof a==='boolean')return a?'True':'False';
      if(a===null)return'None';
      if(typeof a==='object')return JSON.stringify(a);
      return String(a);
    }).join(' '));
    try{
      let mod=code
        .replace(/True/g,'true').replace(/False/g,'false').replace(/None/g,'null')
        .replace(/print\s*\(/g,'__p__(')
        .replace(/input\s*\([^)]*\)/g,'"input_simuliran"')
        .replace(/\*\*/g,'**POWER**').split('**POWER**').reduce((acc,part,i,arr)=>{
          if(i===arr.length-1)return acc+part;
          return acc+part+'**';
        });
      mod=mod.replace(/(\w+)\*\*(\w+)/g,'Math.pow($1,$2)');
      const fn=new Function('__p__',mod);
      fn(fakePrint);
      return lines.join('\n')||'(program nije ništa ispisao)';
    }catch(e){
      return`❌ Greška: ${e.message}\n\nSavet: Proveri sintaksu koda. Python ne prihvata JavaScript sintaksu!`;
    }
  }
};

function runPython(edId,outId){
  const ed=document.getElementById(edId);
  const out=document.getElementById(outId);
  if(!ed||!out)return;
  out.textContent='⏳ Izvršavanje koda...';
  out.style.color='var(--text3)';
  setTimeout(()=>{
    const result=pySimulator.run(ed.value);
    out.textContent=result;
    out.style.color=result.startsWith('❌')?'#ff6b6b':'#7fff7f';
    if(!result.startsWith('❌'))showNotif('✅ Kod izvršen!');
  },400);
}

function copyCode(edId){
  const ed=document.getElementById(edId);
  if(!ed)return;
  navigator.clipboard.writeText(ed.value).then(()=>showNotif('📋 Kod kopiran!')).catch(()=>showNotif('Kopiranje nije uspelo'));
}

const termCommands={
  ls(args){
    const fakeFS={'':['.bashrc','.bash_history','Dokumenti','Preuzimanja','Slike','skripte'],'Dokumenti':['izvestaj.txt','notes.md'],'skripte':['scan.sh','backup.py']};
    const path=args[0]||'';
    const files=fakeFS[path]||fakeFS[''];
    return[files.join('  ')];
  },
  'ls -la'(){return[`ukupno 48\ndrwxr-xr-x 5 student student 4096 jan 15 09:23 .\ndrwxr-xr-x 3 root    root    4096 jan 10 08:00 ..\n-rw------- 1 student student  220 jan 10 08:00 .bash_history\n-rw-r--r-- 1 student student  807 jan 10 08:00 .bashrc\ndrwxr-xr-x 2 student student 4096 jan 15 09:20 Dokumenti\ndrwxr-xr-x 2 student student 4096 jan 12 14:30 skripte`]},
  pwd(){return['/home/student']},
  whoami(){return['student']},
  date(){return[new Date().toLocaleString('sr-RS')]},
  uname(args){return args.includes('-a')?['Linux hacklab 5.15.0-89-generic #99-Ubuntu SMP Mon Oct 30 20:42:41 UTC 2023 x86_64 x86_64 x86_64 GNU/Linux']:['Linux']},
  echo(args){return[args.join(' ')||'']},
  cat(args){
    const files={'.bashrc':'# ~/.bashrc\nexport PS1="\\u@hack-lab:\\w$ "\nalias ll="ls -la"\nalias cls="clear"','notes.md':'# Beleške\n- nmap -sV za otkrivanje servisa\n- chmod 755 za izvršne fajlove\n- grep -r za rekurzivnu pretragu'};
    const fn=args[0];
    return[files[fn]||`cat: ${fn||'(nije naveden fajl)'}: Fajl ne postoji`];
  },
  grep(args){
    if(!args.length)return['grep: nije naveden uzorak za pretragu'];
    return[`grep: Pretraga za "${args[0]}" — u sandbox okruženju nema stvarnih fajlova za pretragu`,`Koristiti: grep "uzorak" fajl.txt`];
  },
  help(){return['Dostupne komande:','  ls [-la]   - lista fajlova','  cd [dir]   - promeni direktorijum','  pwd        - trenutna putanja','  echo [txt] - ispiši tekst','  cat [fajl] - prikaži sadržaj fajla','  grep       - pretraga teksta','  whoami     - prikaži korisnika','  uname -a   - info o sistemu','  date       - datum i vreme','  clear      - obriši terminal','  help       - ova pomoć']},
  clear(){return['__clear__']},
  cd(args){return[`Prešao u: /home/student/${args[0]||''}`.replace(/\/$/,'')]},
  man(args){return[`man ${args[0]||'(komanda)'}:\nKoristiti "help" za listu komandi u sandbox-u`]},
  ls(args){
    if(args[0]==='-la'||args[0]==='-al')return termCommands['ls -la']();
    const files=['.bashrc','.bash_history','Dokumenti','Preuzimanja','Slike','skripte'];
    return[files.join('  ')];
  }
};

function handleTermInput(e){
  if(e.key!=='Enter')return;
  const input=e.target;
  const raw=input.value.trim();
  input.value='';
  if(!raw)return;
  const parts=raw.split(' ');
  const cmd=parts[0];
  const args=parts.slice(1);
  const body=document.getElementById('term-body');
  const addLine=(t,cls='output')=>{
    t.split('\n').forEach(line=>{
      const d=document.createElement('div');
      d.className='terminal-line '+cls;
      d.textContent=line;
      body.appendChild(d);
    });
  };
  addLine(`student@hack-lab:~$ ${raw}`,'prompt');
  const handler=termCommands[cmd];
  if(handler){
    const out=handler(args);
    if(out[0]==='__clear__'){body.innerHTML='';return;}
    out.forEach(l=>addLine(l));
  }else{
    addLine(`bash: ${cmd}: komanda nije pronađena`,'error');
    addLine('Kucaj "help" za listu dostupnih komandi');
  }
  body.scrollTop=body.scrollHeight;
}

function buildQuiz(questions){
  if(!questions||!questions.length)return'<p>Kviz nije dostupan.</p>';
  currentQuizData=questions;
  ST.quizState={q:0,score:0,answered:false,selected:null,done:false};
  return renderQuizState(questions);
}

function renderQuizState(questions){
  const qs=ST.quizState;
  questions=questions||currentQuizData;
  if(qs.done){
    const pct=Math.round(qs.score/questions.length*100);
    return`<div class="quiz-result">
      <div class="quiz-score">${pct}%</div>
      <div style="font-size:18px;font-weight:700;margin-bottom:8px">${pct>=70?'Odlično! 🎉':'Nastavi vežbanje! 💪'}</div>
      <div style="color:var(--text2);margin-bottom:20px">Tačnih odgovora: ${qs.score} od ${questions.length}</div>
      <button class="quiz-btn" onclick="restartQuiz()">🔄 Ponovi Kviz</button>
    </div>`;
  }
  const q=questions[qs.q];
  return`
  <div class="quiz-progress">${questions.map((_,i)=>`<div class="quiz-dot ${i<qs.q?'done':i===qs.q?'current':''}"></div>`).join('')}</div>
  <div style="font-size:12px;color:var(--text3);margin-bottom:12px">Pitanje ${qs.q+1} od ${questions.length}</div>
  <div class="quiz-question">${q.q}</div>
  <div class="quiz-options">${q.opts.map((opt,i)=>`
    <button class="quiz-option ${qs.answered?(i===q.correct?'correct':i===qs.selected&&qs.selected!==q.correct?'wrong':qs.selected===i?'selected':''):(qs.selected===i?'selected':'')}" onclick="${!qs.answered?`quizSelect(${i})`:''}()" ${qs.answered?'disabled':''}>
      ${String.fromCharCode(65+i)}. ${opt}
    </button>`).join('')}</div>
  ${qs.answered?`<div class="tip-box ${qs.selected===q.correct?'success':'warning'}" style="margin-bottom:16px">${qs.selected===q.correct?'✅ Tačno! Odlično!':'❌ Netačno. Tačan odgovor: '+String.fromCharCode(65+q.correct)+'. '+q.opts[q.correct]}</div>`:''}
  <button class="quiz-btn" id="quiz-main-btn" onclick="${qs.answered?'quizNext':'quizCheck'}()" ${!qs.answered&&qs.selected===null?'disabled':''}>${qs.answered?(qs.q===questions.length-1?'Završi Kviz':'Sledeće Pitanje →'):'Proveri Odgovor'}</button>`;
}

function quizSelect(i){
  if(ST.quizState.answered)return;
  ST.quizState.selected=i;
  document.querySelectorAll('.quiz-option').forEach((el,idx)=>{
    el.className='quiz-option'+(idx===i?' selected':'');
  });
  const btn=document.getElementById('quiz-main-btn');
  if(btn)btn.disabled=false;
}

function quizCheck(){
  const qs=ST.quizState;
  if(qs.selected===null)return;
  qs.answered=true;
  const q=currentQuizData[qs.q];
  if(qs.selected===q.correct){qs.score++;ST.xp+=10;showNotif('✅ Tačno! +10 XP');}
  else{showNotif('❌ Pogrešno! Pročitaj objašnjenje');}
  refreshQuizArea();
}

function quizNext(){
  const qs=ST.quizState;
  if(qs.q===currentQuizData.length-1){qs.done=true;}
  else{qs.q++;qs.answered=false;qs.selected=null;}
  refreshQuizArea();
}

function restartQuiz(){
  ST.quizState={q:0,score:0,answered:false,selected:null,done:false};
  refreshQuizArea();
}

function refreshQuizArea(){
  const qa=document.getElementById('quiz-area')||document.getElementById('py-quiz-area');
  if(qa)qa.innerHTML=renderQuizState();
}

function renderAI(c){
  c.innerHTML=`
  <div class="ai-container">
    <div class="ai-messages" id="ai-messages">${ST.aiMessages.map(m=>buildAIMsg(m)).join('')}</div>
    <div style="padding:10px 16px;border-top:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap">
      ${['Objasni nmap','Šta je SQL Injection?','Kako postati etički haker?','Python za početnike','Šta je TCP/IP?','Nmap tutorial na srpskom'].map(s=>`<button onclick="sendAIMsg('${s}')" style="background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:11px;color:var(--text2);cursor:pointer;font-family:Syne,sans-serif;transition:all .2s" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border)'">${s}</button>`).join('')}
    </div>
    <div class="ai-input-row">
      <textarea class="ai-input" id="ai-input" rows="2" placeholder="Postavi pitanje AI Mentoru... (Enter = pošalji, Shift+Enter = novi red)" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendAIFromInput()}"></textarea>
      <button class="ai-send-btn" id="ai-send-btn" onclick="sendAIFromInput()">➤</button>
    </div>
  </div>`;
  scrollAI();
}

function buildAIMsg(m){
  return`<div class="ai-msg ${m.role}">
    <div class="ai-avatar ${m.role}">${m.role==='bot'?'🤖':'👤'}</div>
    <div class="ai-bubble">${m.text.replace(/\n/g,'<br>').replace(/\*(.*?)\*/g,'<strong>$1</strong>').replace(/`(.*?)`/g,'<code style="font-family:JetBrains Mono,monospace;background:var(--bg);padding:1px 5px;border-radius:4px;font-size:12px">$1</code>')}</div>
  </div>`;
}

function scrollAI(){setTimeout(()=>{const el=document.getElementById('ai-messages');if(el)el.scrollTop=el.scrollHeight;},50);}

function sendAIFromInput(){
  const input=document.getElementById('ai-input');
  if(!input||ST.aiLoading)return;
  const text=input.value.trim();
  if(!text)return;
  input.value='';
  sendAIMsg(text);
}

async function sendAIMsg(text){
  if(ST.aiLoading)return;
  ST.aiMessages.push({role:'user',text});
  ST.aiLoading=true;
  const container=document.getElementById('ai-messages');
  if(!container){ST.aiLoading=false;return;}
  container.innerHTML=ST.aiMessages.map(m=>buildAIMsg(m)).join('');
  const typing=document.createElement('div');
  typing.className='ai-msg bot';
  typing.innerHTML=`<div class="ai-avatar bot">🤖</div><div class="ai-bubble"><div class="ai-typing"><div class="ai-dot"></div><div class="ai-dot"></div><div class="ai-dot"></div></div></div>`;
  container.appendChild(typing);
  scrollAI();
  const btn=document.getElementById('ai-send-btn');
  if(btn)btn.disabled=true;
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system:`Ti si AI Mentor za HackAcademy — srpsku platformu za učenje etičkog hakovanja, Linuxa, CMD, PowerShell, mreža i Python programiranja.

UVEK odgovaraj NA SRPSKOM JEZIKU. Budi prijatan, jasan i prilagođen početnicima.

Tvoje uloge:
• Objašnjavaš Linux, CMD i PowerShell komande na srpskom sa praktičnim primerima
• Objašnjavaš mrežne protokole (TCP/IP, DNS, DHCP, HTTP/HTTPS)
• Pomažeš sa Python programiranjem
• Objašnjavaš SAMO legalne aspekte etičkog hakovanja i sajber bezbednosti
• NIKAD ne pomažeš sa ilegalnim aktivnostima ili napadima na sisteme bez dozvole

Format odgovora:
• Koristi emojije za bolje čitanje
• Daj konkretne primere komandi i koda
• Objasni greške jasno na srpskom
• Navedi primere iz stvarnog života
• Motiviši korisnika

Za svaku komandu ili koncept objasni: šta radi, sintaksu, primer korišćenja i česte greške.`,
        messages:ST.aiMessages.map(m=>({role:m.role==='bot'?'assistant':'user',content:m.text}))
      })
    });
    const data=await resp.json();
    const reply=data.content?.map(b=>b.text||'').join('')||'Izvini, došlo je do greške u komunikaciji sa AI serverom.';
    ST.aiMessages.push({role:'bot',text:reply});
  }catch(err){
    ST.aiMessages.push({role:'bot',text:'⚠️ Greška u konekciji. Proveri internet vezu i pokušaj ponovo.\n\nAko si offline, mogu da pomognem sa informacijama koje su već u aplikaciji!'});
  }
  ST.aiLoading=false;
  const c2=document.getElementById('ai-messages');
  if(c2)c2.innerHTML=ST.aiMessages.map(m=>buildAIMsg(m)).join('');
  const btn2=document.getElementById('ai-send-btn');
  if(btn2)btn2.disabled=false;
  scrollAI();
}

function showNotif(msg,dur=2500){
  const n=document.getElementById('notif');
  n.textContent=msg;n.style.display='block';
  clearTimeout(n._t);n._t=setTimeout(()=>n.style.display='none',dur);
}
